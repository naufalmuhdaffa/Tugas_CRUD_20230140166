<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Manajemen Data KTP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
</head>

<body class="container mt-5">

<h2 class="mb-4">Manajemen Data KTP</h2>

<div class="card mb-4">
    <div class="card-body">

        <h5 class="card-title" id="formTitle">Tambah Data KTP</h5>

        <form id="ktpForm">

            <input type="hidden" id="ktpId">

            <div class="row g-3">

                <div class="col-md-4">
                    <label class="form-label">Nomor KTP</label>
                    <input type="text"
                           id="nomorKtp"
                           class="form-control"
                           maxlength="16"
                           inputmode="numeric"
                           oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                           placeholder="Masukkan nomor KTP (16 digit)"
                           required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text"
                           id="namaLengkap"
                           class="form-control"
                           pattern="[A-Za-z. ]+"
                           placeholder="Masukkan nama lengkap"
                           required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Jenis Kelamin</label>
                    <select id="jenisKelamin" class="form-control">
                        <option value="Laki-laki">Laki-laki</option>
                        <option value="Perempuan">Perempuan</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Alamat</label>
                    <input type="text" id="alamat" class="form-control" placeholder="Masukkan alamat" required>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Tanggal Lahir (Minimal 17 Tahun)</label>
                    <input type="date" id="tanggalLahir" class="form-control" required>
                </div>

                <div class="col-md-3 d-flex align-items-end">

                    <button type="submit" id="btnSubmit" class="btn btn-primary w-100">
                        Simpan Data
                    </button>

                    <button type="button" id="btnCancel" class="btn btn-secondary ms-2" style="display:none;"
                            onclick="resetForm()">
                        Batal
                    </button>

                </div>

            </div>

        </form>
    </div>
</div>

<table class="table table-bordered table-striped">

    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Nomor KTP</th>
        <th>Nama</th>
        <th>Alamat</th>
        <th>Tanggal Lahir</th>
        <th>Jenis Kelamin</th>
        <th>Aksi</th>
    </tr>
    </thead>

    <tbody id="ktpTableBody"></tbody>

</table>

<script>

    const apiUrl = '/ktp';
    let isUpdate = false;

    function formatDate(dateString){
    const d = new Date(dateString);
    return d.toLocaleDateString('id-ID');
    }

    $(document).ready(function(){

    loadKtp();

    const today = new Date();
    today.setFullYear(today.getFullYear() - 17);

    const maxDate = today.toISOString().split('T')[0];

    $('#tanggalLahir').attr('max', maxDate);

    $('#ktpForm').submit(function(e){

    e.preventDefault();

    const birthDate = new Date($('#tanggalLahir').val());
    const today = new Date();

    let age = today.getFullYear() - birthDate.getFullYear();
    const m = today.getMonth() - birthDate.getMonth();

    if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
        age--;
    }

    if (age < 17) {
        alert("Umur minimal harus 17 tahun");
        return;
    }

    if(!/^[0-9]{16}$/.test($('#nomorKtp').val())){
    alert("Nomor KTP harus 16 digit angka");
    return;
    }

    if(!/^[A-Za-z. ]+$/.test($('#namaLengkap').val())){
    alert("Nama hanya boleh huruf");
    return;
    }

    const ktpData = {

    nomorKtp: $('#nomorKtp').val(),
    namaLengkap: $('#namaLengkap').val(),
    alamat: $('#alamat').val(),
    tanggalLahir: $('#tanggalLahir').val(),
    jenisKelamin: $('#jenisKelamin').val()

    };

    if(isUpdate){

    const id = $('#ktpId').val();
    updateKtp(id, ktpData);

    }else{

    addKtp(ktpData);

    }

    });

    });

    function loadKtp(){

    $.get(apiUrl,function(response){

    let rows = '';

    response.data.forEach(ktp => {

    rows += `

    <tr>

    <td>${ktp.id}</td>
    <td>${ktp.nomorKtp}</td>
    <td>${ktp.namaLengkap}</td>
    <td>${ktp.alamat}</td>
    <td>${formatDate(ktp.tanggalLahir)}</td>
    <td>${ktp.jenisKelamin}</td>

    <td>

    <button class="btn btn-warning btn-sm"
    onclick="editKtp(${ktp.id},
    '${ktp.nomorKtp}',
    '${ktp.namaLengkap}',
    '${ktp.alamat}',
    '${ktp.tanggalLahir}',
    '${ktp.jenisKelamin}')">
    Edit
    </button>

    <button class="btn btn-danger btn-sm"
    onclick="deleteKtp('${ktp.id}')">
    Hapus
    </button>

    </td>

    </tr>

    `;

    });

    $('#ktpTableBody').html(rows);

    });

    }

    function addKtp(data){

    $.ajax({

    url: apiUrl,
    type:'POST',
    contentType:'application/json',
    data:JSON.stringify(data),

    success:function(){

    resetForm();
    loadKtp();

    alert('Data KTP berhasil ditambahkan');

    },

    error:function(xhr){

    let msg = "Terjadi kesalahan";

    if(xhr.responseJSON && xhr.responseJSON.message){
        msg = xhr.responseJSON.message;
    }

    alert(msg);

    }

    });

    }

    function updateKtp(id,data){

    $.ajax({

    url:`${apiUrl}/${id}`,
    type:'PUT',
    contentType:'application/json',
    data:JSON.stringify(data),

    success:function(){

    resetForm();
    loadKtp();

    alert('Data berhasil diperbarui');

    },

    error:function(xhr){

    let msg = "Gagal memperbarui data";

    if(xhr.responseJSON && xhr.responseJSON.message){
        msg = xhr.responseJSON.message;
    }

    alert(msg);

    }

    });

    }

    function deleteKtp(id){

    if(confirm('Yakin ingin menghapus data ini?')){

    $.ajax({

    url:`${apiUrl}/${id}`,
    type:'DELETE',

    success:function(){

    loadKtp();

    alert('Data berhasil dihapus');

    }

    });

    }

    }

    function editKtp(id,nomorKtp,namaLengkap,alamat,tanggalLahir,jenisKelamin){

    $('#ktpId').val(id);
    $('#nomorKtp').val(nomorKtp);
    $('#namaLengkap').val(namaLengkap);
    $('#alamat').val(alamat);
    $('#tanggalLahir').val(tanggalLahir);
    $('#jenisKelamin').val(jenisKelamin);

    $('#formTitle').text('Edit Data KTP');

    $('#btnSubmit')
    .text('Update Data')
    .removeClass('btn-primary')
    .addClass('btn-success');

    $('#btnCancel').show();

    isUpdate = true;

    }

    function resetForm(){

    $('#ktpId').val('');
    $('#nomorKtp').val('');
    $('#namaLengkap').val('');
    $('#alamat').val('');
    $('#tanggalLahir').val('');
    $('#jenisKelamin').val('Laki-laki');

    $('#formTitle').text('Tambah Data KTP');

    $('#btnSubmit')
    .text('Simpan Data')
    .removeClass('btn-success')
    .addClass('btn-primary');

    $('#btnCancel').hide();

    isUpdate = false;

    }

</script>

</body>
</html>
